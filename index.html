<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seoyul710 | Timer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="fonts/pretendardvariable.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <main>
  <div class="container">
    <div class="mode_toggle_btn_box">
      <div id="mode_toggle_btn"></div>
      <button type="button" class="mode_toggle-btns" onclick="mode_toggle_click('timer')">Timer</button>
      <button type="button" class="mode_toggle-btns" onclick="mode_toggle_click('stopwatch')">Stopwatch</button>
      <button type="button" class="mode_toggle-btns" onclick="mode_toggle_click('clock')">Clock</button>
    </div>
  </div>

    <div id="end_text">타이머가 종료되었습니다.</div>
    <div id="info_text">서울, 한국 표준시(KST)</div>

  <div class="minus_symbol" id="minus_symbol">-</div>

    <div class="time_container">
      <div id="hours">00</div>
      <div>:</div>
      <div id="minutes">00</div>
      <div>:</div>
      <div id="seconds">00</div>
    </div>

    <div class="add_buttons_container">
      <button class="add_time" id="add1h">+1h</button>
      <button class="add_time" id="add30m">+30m</button>
      <button class="add_time" id="add15m">+15m</button>
      <button class="add_time" id="add10m">+10m</button>
      <button class="add_time" id="add5m">+5m</button>
      <button class="add_time" id="addself">직접 입력하기</button>
    </div>

    <div class="start_reset_buttons_container">
      <button class="reset_btn" id="resettime">초기화</button>
      <button class="start_btn" id="start">시작하기</button>
    </div>

      <button class="exit_btn" id="exit">나가기</button>
  </main>


  <script src="mode.js"></script>
  <script src="timer.js"></script>
  <script src="stopwatch.js"></script>
  <script src="clock.js"></script>
  <script src="script.js"></script>

</body>
